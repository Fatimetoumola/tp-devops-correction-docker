---
- name: Install Docker prerequisites on the server
  hosts: all
  become: true
  gather_facts: true

  roles:
    - docker

- name: Deploy the application with dedicated Docker roles
  hosts: all
  become: true
  gather_facts: false
  vars:
    ansible_python_interpreter: "{{ docker_module_python_interpreter }}"

  roles:
    - cleanup_legacy
    - network
    - database
    - app
    - front
    - proxy

  tasks:
    - name: Wait until the frontend answers over HTTP
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ http_port }}/"
        status_code: 200
      register: app_http_check
      retries: 20
      delay: 5
      until: app_http_check.status == 200

    - name: Wait until the API answers through the proxy
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ http_port }}/api/departments"
        status_code: 200
      register: api_http_check
      retries: 20
      delay: 5
      until: api_http_check.status == 200
