docker_apt_arch_map:
  x86_64: amd64
  amd64: amd64
  aarch64: arm64
  arm64: arm64

docker_apt_arch: "{{ docker_apt_arch_map.get(ansible_architecture | default('amd64'), ansible_architecture | default('amd64')) }}"
docker_venv_path: /opt/docker_venv
docker_module_python_interpreter: "{{ docker_venv_path }}/bin/python"

dockerhub_username: fatimetoumola

http_port: 80
docker_network_name: tp-devops-network

database_name: db
database_user: usr
database_password: pwd
database_container_name: database
backend_container_name: simple-api
frontend_container_name: frontend
httpd_container_name: httpd
legacy_compose_containers:
  - tp-devops-frontend-1
  - tp-devops-httpd-1
  - tp-devops-simple-api-1
  - tp-devops-database-1

database_image: "{{ dockerhub_username }}/tp-devops-database:latest"
backend_image: "{{ dockerhub_username }}/tp-devops-simple-api:latest"
frontend_image: "{{ dockerhub_username }}/tp-devops-frontend:latest"
httpd_image: "{{ dockerhub_username }}/tp-devops-httpd:latest"
